<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tikko Live Agency</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif}
body{min-height:100vh;background:linear-gradient(120deg,#ead8ff,#d89cff,#efc7ff);overflow-x:hidden}
header{padding:25px 30px;display:flex;justify-content:space-between;align-items:center}
.logo img{max-width:140px;max-height:50px;width:auto;height:auto;object-fit:contain}
nav a{margin-left:45px;text-decoration:none;color:#765879;font-size:22px;font-weight:bold}
.container{display:flex;align-items:center;justify-content:space-between;padding:70px 9%}
.left{width:55%}h1{color:white;font-size:80px;line-height:1.2}
.line{width:280px;height:8px;background:#d62fff;margin:20px 0;border-radius:20px}
.btn{display:flex;align-items:center;justify-content:center;width:650px;height:75px;border-radius:25px;border:2px solid white;background:linear-gradient(90deg,#7d00ff,#ff349b,#ffae2b);color:white;text-decoration:none;font-size:25px;font-weight:bold}
.desc{color:white;font-size:25px;margin-top:25px;line-height:1.5}
.store{display:flex;gap:20px;margin-top:20px}
.store button{padding:15px 30px;border-radius:15px}
.right{position:relative;width:45%;height:600px}
.phone{position:absolute;width:290px;border-radius:35px}
.phone1{right:40px;top:70px}.phone2{right:250px;top:130px}.phone3{right:-70px;top:160px}
@media(max-width:900px){nav{display:none}.container{flex-direction:column;padding:40px 20px;text-align:center}.left,.right{width:100%}h1{font-size:45px}.btn{width:100%;font-size:20px}.right{height:430px}.phone{width:200px}}
</style>
</head>
<body>
<header>
<div class="logo"><img src="logo.png"></div>
<nav><a>Home</a><a>Agency</a><a>About</a><a>Contact us</a></nav>
</header>
<section class="container">
<div class="left">
<h1>Become Tikko Live<br>Agency</h1>
<div class="line"></div>
<a class="btn" href="https://videochat.kissu.site/invite-agent_new/?inviter_id=78195510&c=cde" target="_blank">🤝 TIKKO AGENCY LINK</a>
<p class="desc">Connect anyone, anywhere, anytime. Help users convey values and share happiness in a timely, stable and honest manner.</p>
</div>
<div class="right">
<img src="phone-left.png" class="phone phone2">
<img src="phone-main.png" class="phone phone1">
<img src="phone-right.png" class="phone phone3">
</div>
</section>
<script>
document.addEventListener("click",function(e){if(!e.target.closest(".btn"))location.reload();});
</script>
</body>
</html>
